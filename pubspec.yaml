name: slrs_gemini
description: "Real-Time Ghanaian Sign Language Recognition (Gemini)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera + media
  camera: ^0.11.0+2
  image: ^4.3.0

  # OpenRouter (Gemini via gateway) — plain HTTP
  http: ^1.2.2

  # Text-to-speech
  flutter_tts: ^4.2.0

  # On-device hand/body landmarks
  google_mlkit_pose_detection: ^0.14.0

  # Env / permissions / utils
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
